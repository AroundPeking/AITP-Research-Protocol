<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AITP README Hero</title>
  <desc id="desc">A wide AITP banner with a centered sci-fi robot mark on the left, protocol messaging in the center, and the L0 to L4 route at the bottom.</desc>
