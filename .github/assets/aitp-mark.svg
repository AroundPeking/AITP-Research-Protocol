<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AITP Mark</title>
  <desc id="desc">A dark rounded-square AITP logo with a centered sci-fi robot icon inside a circular portal.</desc>
  <defs>
    <linearGradient id="bg" x1="42" y1="34" x2="462" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061725"/>
      <stop offset="0.54" stop-color="#091D31"/>
      <stop offset="1" stop-color="#040B13"/>
    </linearGradient>
    <radialGradient id="portal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(164)">
      <stop stop-color="#12324D"/>
      <stop offset="0.68" stop-color="#0A1C2F"/>
      <stop offset="1" stop-color="#060E18"/>
    </radialGradient>
    <linearGradient id="shellStroke" x1="194" y1="164" x2="320" y2="356" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEFBFF"/>
      <stop offset="0.52" stop-color="#9CECF7"/>
      <stop offset="1" stop-color="#A78EFF"/>
    </linearGradient>
    <linearGradient id="shellFill" x1="256" y1="170" x2="256" y2="354" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7F8FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#78C8FF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="visorFill" x1="220" y1="208" x2="292" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8AF6EE"/>
      <stop offset="1" stop-color="#6FA7FF"/>
    </linearGradient>
    <filter id="coreGlow" x="152" y="148" width="208" height="222" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="visorGlow" x="204" y="194" width="104" height="58" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#bg)"/>
  <rect x="24.5" y="24.5" width="463" height="463" rx="95.5" stroke="#61DEF1" stroke-opacity="0.16"/>

  <circle cx="256" cy="256" r="146" fill="url(#portal)"/>
  <circle cx="256" cy="256" r="118" stroke="#7EE8F2" stroke-opacity="0.14" stroke-width="2"/>
  <circle cx="256" cy="256" r="88" stroke="#A98BFF" stroke-opacity="0.14" stroke-width="2"/>

  <circle cx="188" cy="322" r="84" fill="#1CE2C7" fill-opacity="0.08"/>
  <circle cx="306" cy="192" r="74" fill="#6BA8FF" fill-opacity="0.08"/>
  <circle cx="258" cy="252" r="66" fill="#89F3F0" fill-opacity="0.1" filter="url(#coreGlow)"/>

  <g fill="url(#shellFill)">
    <rect x="194" y="170" width="124" height="106" rx="34"/>
    <path d="M214 314C228 296 284 296 298 314L314 350H198L214 314Z"/>
  </g>

  <g stroke="url(#shellStroke)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 140V170"/>
    <path d="M194 223H176"/>
    <path d="M318 223H336"/>
    <rect x="194" y="170" width="124" height="106" rx="34"/>
    <path d="M214 314C228 296 284 296 298 314L314 350H198L214 314Z"/>
    <path d="M238 276V314"/>
    <path d="M274 276V314"/>
    <path d="M234 334H278"/>
    <path d="M246 350L232 370"/>
    <path d="M266 350L280 370"/>
  </g>

  <g fill="url(#visorFill)" filter="url(#visorGlow)">
    <rect x="220" y="206" width="72" height="28" rx="14"/>
  </g>
  <g fill="#A6FFF8">
    <circle cx="242" cy="220" r="5.5"/>
    <circle cx="270" cy="220" r="5.5"/>
  </g>
  <path d="M234 250H278" stroke="#FFC857" stroke-width="10" stroke-linecap="round"/>

  <g fill="#DDF9FF">
    <circle cx="256" cy="132" r="8"/>
    <circle cx="238" cy="334" r="5.5"/>
    <circle cx="274" cy="334" r="5.5"/>
  </g>
